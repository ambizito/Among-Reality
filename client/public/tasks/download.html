<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Download</title>
    <link rel="stylesheet" href="/tasks/shared.css" />
    <style>
      .transfer {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .transfer-zone {
        border-color: #1d4f67;
        background:
          radial-gradient(circle at 20% 18%, rgba(56, 189, 248, 0.12), transparent 36%),
          radial-gradient(circle at 82% 84%, rgba(34, 197, 94, 0.08), transparent 34%),
          linear-gradient(180deg, #091121 0%, #070d18 100%);
        display: grid;
        place-items: center;
        padding: 14px;
      }

      .node-line {
        width: 100%;
        max-width: 300px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 8px;
      }

      .node {
        height: clamp(66px, 14vw, 82px);
        border-radius: 18px;
        border: 1px solid #2a435d;
        background: linear-gradient(180deg, #152337, #0d1625);
        display: grid;
        place-items: center;
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #9fb3d4;
        font-weight: 800;
      }

      .node strong {
        display: block;
        font-size: 14px;
        color: #e2f3ff;
        letter-spacing: 0.06em;
      }

      .pipe {
        width: min(150px, 34vw);
        height: 12px;
        border-radius: 999px;
        background: #0d1829;
        border: 1px solid #28405b;
        position: relative;
        overflow: hidden;
      }

      .pipe-glow {
        position: absolute;
        inset: 0;
        opacity: 0;
        background: linear-gradient(90deg, rgba(34, 211, 238, 0), rgba(34, 211, 238, 0.75), rgba(34, 211, 238, 0));
      }

      .pipe.running .pipe-glow {
        opacity: 1;
        animation: pipe-flow 0.9s linear infinite;
      }

      @keyframes pipe-flow {
        from {
          transform: translateX(-100%);
        }
        to {
          transform: translateX(100%);
        }
      }

      .meta-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--muted);
      }

      .progress-fill {
        background: linear-gradient(90deg, #2563eb, #22d3ee);
      }

      .task-button {
        margin-top: 2px;
      }

      .task-button.alt {
        background: linear-gradient(180deg, #22c55e, #15803d);
        color: #021509;
      }

      .task-button.dark {
        background: linear-gradient(180deg, #334155, #1e293b);
        color: #dbeafe;
      }
    </style>
  </head>
  <body>
    <div class="task">
      <div class="task-title">Download</div>
      <div class="task-sub">Transfer encrypted data to local drive.</div>

      <div class="hud-row">
        <div id="statusText">Standby</div>
        <div><strong id="pct">0%</strong></div>
      </div>

      <div class="play-area transfer-zone">
        <div class="screen-grid"></div>
        <div class="node-line">
          <div class="node">
            Source
            <strong>COMMS</strong>
          </div>
          <div class="pipe" id="pipe">
            <div class="pipe-glow"></div>
          </div>
          <div class="node" id="destinationNode">
            Drive
            <strong>LOCAL</strong>
          </div>
        </div>
      </div>

      <div class="transfer">
        <div class="meta-row">
          <span id="label">Awaiting command</span>
          <span id="speed">0.0 MB/s</span>
        </div>
        <div class="progress-shell">
          <div class="progress-fill" id="fill"></div>
        </div>
      </div>

      <button id="actionBtn" class="task-button" type="button">Start Download</button>
      <div id="status" class="status">Press start to begin transfer.</div>
    </div>

    <script>
      const statusText = document.getElementById('statusText');
      const pctEl = document.getElementById('pct');
      const labelEl = document.getElementById('label');
      const speedEl = document.getElementById('speed');
      const fillEl = document.getElementById('fill');
      const statusEl = document.getElementById('status');
      const pipeEl = document.getElementById('pipe');
      const destinationNodeEl = document.getElementById('destinationNode');
      const actionBtn = document.getElementById('actionBtn');

      let progress = 0;
      let running = false;
      let done = false;
      let timer = null;
      let completeSent = false;

      function notifyComplete() {
        if (completeSent) return;
        completeSent = true;
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'TASK_COMPLETE', taskId: 'DOWNLOAD' }, window.location.origin);
        }
      }

      function randomSpeed() {
        return (Math.random() * 6.5 + 2.6).toFixed(1);
      }

      function updateUI() {
        const pct = Math.floor(progress);
        pctEl.textContent = `${pct}%`;
        fillEl.style.width = `${pct}%`;

        if (done) {
          statusText.textContent = 'Completed';
          labelEl.textContent = 'Transfer completed';
          speedEl.textContent = '0.0 MB/s';
          statusEl.textContent = 'Data secured.';
          statusEl.className = 'status success';
          actionBtn.textContent = 'Done';
          actionBtn.disabled = true;
          actionBtn.className = 'task-button alt';
          pipeEl.classList.remove('running');
          destinationNodeEl.style.borderColor = '#22c55e';
          destinationNodeEl.style.boxShadow = '0 0 22px rgba(34, 197, 94, 0.35)';
          return;
        }

        if (running) {
          statusText.textContent = 'Downloading';
          labelEl.textContent = 'Receiving packets';
          speedEl.textContent = `${randomSpeed()} MB/s`;
          statusEl.textContent = 'Stable connection in progress.';
          statusEl.className = 'status';
          actionBtn.textContent = 'Downloading';
          actionBtn.disabled = true;
          actionBtn.className = 'task-button dark';
          pipeEl.classList.add('running');
        } else {
          statusText.textContent = 'Standby';
          labelEl.textContent = 'Awaiting command';
          speedEl.textContent = '0.0 MB/s';
          statusEl.textContent = 'Press start to begin transfer.';
          statusEl.className = 'status';
          actionBtn.textContent = 'Start Download';
          actionBtn.disabled = false;
          actionBtn.className = 'task-button';
          pipeEl.classList.remove('running');
        }
      }

      function finish() {
        running = false;
        done = true;
        updateUI();
        notifyComplete();
      }

      function tick() {
        const step = Math.random() * 2.2 + 0.65;
        progress = Math.min(100, progress + step);
        updateUI();

        if (progress >= 100) {
          clearInterval(timer);
          timer = null;
          finish();
        }
      }

      function start() {
        if (running || done) return;
        running = true;
        updateUI();
        timer = setInterval(tick, 80);
      }

      actionBtn.addEventListener('click', start);
      updateUI();
    </script>
  </body>
</html>
