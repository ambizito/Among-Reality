<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Lixo</title>
    <link rel="stylesheet" href="/tasks/shared.css" />
    <style>
      .garbage-area {
        margin-top: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
      }
      .bin {
        width: 120px;
        height: 200px;
        border-radius: 12px 12px 20px 20px;
        border: 3px solid #334155;
        background: #0b1220;
        position: relative;
        overflow: hidden;
      }
      .trash-fill {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 100%;
        background: linear-gradient(180deg, #f59e0b, #b45309 70%);
        transition: height 0.08s linear;
      }
      .trash-pattern {
        position: absolute;
        inset: 0;
        opacity: 0.35;
        background-image: radial-gradient(circle at 8px 8px, #111827 2px, transparent 3px);
        background-size: 18px 18px;
      }
      .lever {
        width: 70px;
        height: 220px;
        border-radius: 999px;
        border: 3px solid #0f172a;
        background: #1f2937;
        position: relative;
        display: flex;
        justify-content: center;
      }
      .lever-track {
        width: 10px;
        height: 90%;
        margin-top: 10px;
        background: rgba(15, 23, 42, 0.6);
        border-radius: 999px;
      }
      .handle {
        position: absolute;
        width: 52px;
        height: 68px;
        border-radius: 14px;
        background: #ef4444;
        border-bottom: 6px solid #b91c1c;
        cursor: grab;
        display: grid;
        place-items: center;
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        transition: transform 0.18s ease;
        touch-action: none;
      }
      .handle.dragging {
        transition: none;
        cursor: grabbing;
      }
      .status {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="task">
      <div class="task-title">Lixo</div>
      <div class="task-sub">Pull and hold to empty the trash.</div>
      <div class="garbage-area">
        <div class="bin">
          <div id="trashFill" class="trash-fill">
            <div class="trash-pattern"></div>
          </div>
        </div>
        <div class="lever">
          <div class="lever-track"></div>
          <div id="handle" class="handle">Hold</div>
        </div>
      </div>
      <div id="status" class="status">Hold the lever down.</div>
    </div>

    <script>
      const handle = document.getElementById('handle');
      const trashFill = document.getElementById('trashFill');
      const statusEl = document.getElementById('status');

      const maxDrag = 150;
      let dragOffset = 0;
      let handlePos = 0;
      let holding = false;
      let trashLevel = 100;
      let drainTimer = null;
      let done = false;

      function notifyComplete() {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'TASK_COMPLETE', taskId: 'LIXO' }, window.location.origin);
        }
      }

      function setHandlePos(value) {
        handlePos = Math.max(0, Math.min(value, maxDrag));
        handle.style.transform = `translateY(${handlePos}px)`;
      }

      function updateTrash() {
        trashFill.style.height = `${trashLevel}%`;
      }

      function stopDrain() {
        if (drainTimer) {
          clearInterval(drainTimer);
          drainTimer = null;
        }
      }

      function startDrain() {
        if (drainTimer || done) return;
        drainTimer = setInterval(() => {
          trashLevel = Math.max(0, trashLevel - 2);
          updateTrash();
          if (trashLevel <= 0) {
            done = true;
            stopDrain();
            statusEl.textContent = 'Trash emptied!';
            statusEl.classList.add('success');
            notifyComplete();
          }
        }, 50);
      }

      function updateDrainState() {
        if (holding && handlePos >= maxDrag - 10 && !done) {
          startDrain();
        } else {
          stopDrain();
        }
      }

      handle.addEventListener('pointerdown', (event) => {
        if (done) return;
        holding = true;
        handle.classList.add('dragging');
        dragOffset = event.clientY - handlePos;
      });

      window.addEventListener('pointermove', (event) => {
        if (!holding || done) return;
        const nextPos = event.clientY - dragOffset;
        setHandlePos(nextPos);
        updateDrainState();
      });

      window.addEventListener('pointerup', () => {
        if (!holding) return;
        holding = false;
        handle.classList.remove('dragging');
        stopDrain();
        if (!done) {
          setHandlePos(0);
        }
      });

      window.addEventListener('pointercancel', () => {
        holding = false;
        handle.classList.remove('dragging');
        stopDrain();
        if (!done) setHandlePos(0);
      });

      updateTrash();
    </script>
  </body>
</html>
