<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Comunicacao</title>
    <link rel="stylesheet" href="/tasks/shared.css" />
    <style>
      .comms-area {
        border-color: #32506e;
        background:
          radial-gradient(circle at 20% 16%, rgba(34, 211, 238, 0.14), transparent 35%),
          radial-gradient(circle at 82% 86%, rgba(99, 102, 241, 0.12), transparent 36%),
          linear-gradient(180deg, #08111f 0%, #070d1a 100%);
        display: grid;
        place-items: center;
        padding: 12px;
      }

      .scope {
        width: 100%;
        height: 100%;
        border-radius: 14px;
        border: 1px solid #355474;
        background: linear-gradient(180deg, rgba(10, 20, 36, 0.95), rgba(6, 12, 22, 0.95));
      }

      .lock-shell {
        margin-top: 2px;
      }

      .lock-fill {
        background: linear-gradient(90deg, #06b6d4, #22c55e);
      }

      .control {
        text-align: left;
        margin-top: 4px;
      }

      .control-head {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .slider {
        width: 100%;
        accent-color: #22d3ee;
        min-height: 44px;
      }

      .slider:disabled {
        opacity: 0.5;
      }

      .task-button {
        margin-top: 6px;
      }

      .task-button.alt {
        background: linear-gradient(180deg, #22c55e, #15803d);
        color: #031206;
      }
    </style>
  </head>
  <body>
    <div class="task">
      <div class="task-title">Comunicacao</div>
      <div class="task-sub">Match signal amplitude and frequency until lock reaches 100%.</div>

      <div class="hud-row">
        <div>Sync: <strong id="syncValue">0%</strong></div>
        <div id="stateText">Searching signal</div>
      </div>

      <div class="play-area comms-area">
        <div class="screen-grid"></div>
        <canvas id="scope" class="scope"></canvas>
      </div>

      <div class="lock-shell progress-shell">
        <div id="lockFill" class="progress-fill lock-fill"></div>
      </div>

      <div class="control">
        <div class="control-head">
          <span>Signal Gain</span>
          <strong id="ampValue">10 dB</strong>
        </div>
        <input id="ampSlider" class="slider" type="range" min="5" max="60" step="1" value="10" />
      </div>

      <div class="control">
        <div class="control-head">
          <span>Tuner</span>
          <strong id="freqValue">30 kHz</strong>
        </div>
        <input id="freqSlider" class="slider" type="range" min="0.02" max="0.2" step="0.001" value="0.03" />
      </div>

      <button id="resetBtn" class="task-button" type="button">Rescan</button>
      <div id="status" class="status">Keep signal stable inside target drift.</div>
    </div>

    <script>
      const canvas = document.getElementById('scope');
      const syncValueEl = document.getElementById('syncValue');
      const stateTextEl = document.getElementById('stateText');
      const lockFillEl = document.getElementById('lockFill');
      const ampValueEl = document.getElementById('ampValue');
      const freqValueEl = document.getElementById('freqValue');
      const ampSlider = document.getElementById('ampSlider');
      const freqSlider = document.getElementById('freqSlider');
      const resetBtn = document.getElementById('resetBtn');
      const statusEl = document.getElementById('status');

      const ctx = canvas.getContext('2d');

      let userAmp = 10;
      let userFreq = 0.03;
      let targetAmp = 34;
      let targetFreq = 0.11;
      let lockProgress = 0;
      let proximity = 0;
      let drift = 0;
      let phase = 0;
      let done = false;
      let completeSent = false;
      let raf = null;

      function notifyComplete() {
        if (completeSent) return;
        completeSent = true;
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'TASK_COMPLETE', taskId: 'COMUNICACAO' }, window.location.origin);
        }
      }

      function random(min, max) {
        return min + Math.random() * (max - min);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function resizeCanvas() {
        const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.max(220, Math.floor(rect.width * dpr));
        canvas.height = Math.max(160, Math.floor(rect.height * dpr));
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function drawWave(amp, freq, color, isTarget) {
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        const midY = height / 2;

        ctx.beginPath();
        for (let x = 0; x <= width; x += 2) {
          const y = midY + amp * Math.sin(freq * x + phase);
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }

        ctx.strokeStyle = color;
        ctx.lineWidth = isTarget ? 1.8 : 2.8;
        ctx.setLineDash(isTarget ? [4, 4] : []);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      function drawGrid() {
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;

        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = 'rgba(10, 20, 36, 0.95)';
        ctx.fillRect(0, 0, width, height);

        ctx.strokeStyle = 'rgba(148, 163, 184, 0.12)';
        ctx.lineWidth = 1;

        for (let x = 0; x < width; x += 28) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, height);
          ctx.stroke();
        }

        for (let y = 0; y < height; y += 24) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(width, y);
          ctx.stroke();
        }
      }

      function updateReadouts() {
        syncValueEl.textContent = `${Math.floor(proximity)}%`;
        ampValueEl.textContent = `${Math.round(userAmp)} dB`;
        freqValueEl.textContent = `${Math.round(userFreq * 1000)} kHz`;
        lockFillEl.style.width = `${Math.floor(lockProgress)}%`;

        if (done) {
          stateTextEl.textContent = 'Signal locked';
          statusEl.textContent = 'Communication channel secured.';
          statusEl.className = 'status success';
          resetBtn.textContent = 'Locked';
          resetBtn.className = 'task-button alt';
          ampSlider.disabled = true;
          freqSlider.disabled = true;
          return;
        }

        if (proximity >= 86) {
          stateTextEl.textContent = 'Locking';
          statusEl.textContent = 'Hold this tuning to keep lock rising.';
          statusEl.className = 'status';
        } else {
          stateTextEl.textContent = 'Searching signal';
          statusEl.textContent = 'Adjust gain and tuner to match target drift.';
          statusEl.className = 'status';
        }
      }

      function animate(timestamp) {
        if (done) {
          drawGrid();
          drawWave(targetAmp, targetFreq + drift, 'rgba(34, 211, 238, 0.42)', true);
          drawWave(userAmp, userFreq, '#22c55e', false);
          raf = requestAnimationFrame(animate);
          return;
        }

        drift = Math.sin(timestamp * 0.00125) * 0.006;
        phase += 0.085;

        const targetFreqNow = targetFreq + drift;
        const ampDiff = Math.abs(userAmp - targetAmp) / 60;
        const freqDiff = Math.abs(userFreq - targetFreqNow) / 0.18;
        proximity = clamp(100 - ((ampDiff + freqDiff) / 2) * 220, 0, 100);

        if (proximity > 86) {
          lockProgress = clamp(lockProgress + 0.78, 0, 100);
        } else {
          lockProgress = clamp(lockProgress - 1.25, 0, 100);
        }

        if (lockProgress >= 100) {
          lockProgress = 100;
          done = true;
          notifyComplete();
        }

        drawGrid();
        drawWave(targetAmp, targetFreqNow, 'rgba(34, 211, 238, 0.45)', true);
        drawWave(userAmp, userFreq, done ? '#22c55e' : '#f43f5e', false);
        updateReadouts();

        raf = requestAnimationFrame(animate);
      }

      function resetTask() {
        targetAmp = random(18, 50);
        targetFreq = random(0.05, 0.16);
        userAmp = 10;
        userFreq = 0.03;
        lockProgress = 0;
        proximity = 0;
        drift = 0;
        phase = 0;
        done = false;
        completeSent = false;

        ampSlider.disabled = false;
        freqSlider.disabled = false;
        resetBtn.textContent = 'Rescan';
        resetBtn.className = 'task-button';

        ampSlider.value = String(userAmp);
        freqSlider.value = String(userFreq);
        updateReadouts();
      }

      ampSlider.addEventListener('input', (event) => {
        userAmp = Number(event.target.value);
        updateReadouts();
      });

      freqSlider.addEventListener('input', (event) => {
        userFreq = Number(event.target.value);
        updateReadouts();
      });

      resetBtn.addEventListener('click', () => {
        if (!done) return;
        resetTask();
      });

      window.addEventListener('resize', resizeCanvas);

      resizeCanvas();
      resetTask();
      raf = requestAnimationFrame(animate);
    </script>
  </body>
</html>
